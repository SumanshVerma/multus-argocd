apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: multus-bridge
  namespace: multus-nad
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "bridge-network",
      "type": "bridge",
      "bridge": "br1-multus",
      "macspoofchk": false,
      "preserveDefaultVlan": false,
      "ipam": {
        "type": "dhcp"
      }
    }
